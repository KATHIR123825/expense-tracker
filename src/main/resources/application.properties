# ============================================================
# SPRING BOOT APPLICATION PROPERTIES
# Expense Tracker Application
# ============================================================

# ============================================================
# 1. SERVER CONFIGURATION
# ============================================================
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never

# ============================================================
# 2. DATABASE CONFIGURATION (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8

# Database credentials
spring.datasource.username=root
spring.datasource.password=KATHIR7325

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# 3. JPA / HIBERNATE CONFIGURATION
# ============================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

# ============================================================
# 4. THYMELEAF CONFIGURATION
# ============================================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ============================================================
# 5. LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.expensetracker=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# 6. ALLOW CIRCULAR REFERENCES (FIX FOR SECURITY CONFIG)
# ============================================================
spring.main.allow-circular-references=true

# ============================================================
# 7. SPRING SECURITY
# ============================================================
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN
