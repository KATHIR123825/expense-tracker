<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login — Expense Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ============================================================
           ALL STYLES EMBEDDED - NO EXTERNAL CSS NEEDED
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-shapes .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }

        .bg-shapes .shape:nth-child(1) {
            width: 400px;
            height: 400px;
            background: #4F46E5;
            top: -100px;
            right: -100px;
        }

        .bg-shapes .shape:nth-child(2) {
            width: 300px;
            height: 300px;
            background: #7C3AED;
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        .bg-shapes .shape:nth-child(3) {
            width: 200px;
            height: 200px;
            background: #06B6D4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            animation: fadeInScale 0.6s ease-out forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 40px 32px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-header .logo {
            font-size: 22px;
            font-weight: 800;
            color: #F2EFE9;
        }

        .login-header .logo span {
            color: #E4A96F;
        }

        .login-header .logo i {
            color: #E4A96F;
            margin-right: 8px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: #F2EFE9;
            margin-top: 16px;
        }

        .login-header p {
            color: #8E93A0;
            font-size: 14px;
            margin-top: 4px;
        }

        .alert {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .alert-success {
            background: rgba(74, 222, 155, 0.08);
            color: #4ADE9B;
            border: 1px solid rgba(74, 222, 155, 0.12);
        }

        .alert-danger {
            background: rgba(242, 85, 90, 0.08);
            color: #F2555A;
            border: 1px solid rgba(242, 85, 90, 0.12);
        }

        .alert i {
            font-size: 16px;
            flex-shrink: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #8E93A0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8E93A0;
            font-size: 15px;
        }

        .form-group .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            background: #1B1E26;
            border: 1px solid #262A34;
            border-radius: 12px;
            color: #F2EFE9;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s ease;
            outline: none;
        }

        .form-group .input-wrapper input:focus {
            border-color: #E4A96F;
            box-shadow: 0 0 0 3px rgba(228, 169, 111, 0.1);
        }

        .form-group .input-wrapper input:focus + i {
            color: #E4A96F;
        }

        .form-group .input-wrapper input::placeholder {
            color: #8E93A0;
        }

        .form-group .input-wrapper .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8E93A0;
            cursor: pointer;
            font-size: 15px;
            padding: 4px;
        }

        .form-group .input-wrapper .password-toggle:hover {
            color: #F2EFE9;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4px 0 22px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8E93A0;
            font-size: 13px;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #E4A96F;
            cursor: pointer;
        }

        .form-options a {
            color: #8E93A0;
            font-size: 13px;
            text-decoration: none;
        }

        .form-options a:hover {
            color: #E4A96F;
        }

        .btn-login {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #E4A96F, #d4945e);
            color: #3A2A16;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(228, 169, 111, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(228, 169, 111, 0.35);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login i {
            font-size: 16px;
        }

        .btn-login .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #8E93A0;
            font-size: 14px;
        }

        .login-footer a {
            color: #E4A96F;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            color: #d4945e;
        }

        .login-footer .secure-text {
            margin-top: 14px;
            font-size: 12px;
            color: #8E93A0;
        }

        .login-footer .secure-text i {
            margin-right: 4px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .login-card {
                padding: 32px 24px 28px;
            }
            .login-header h1 { font-size: 22px; }
            .login-header .logo { font-size: 20px; }
        }

        @media (max-width: 480px) {
            body { padding: 12px; align-items: flex-start; padding-top: 40px; }
            .login-card { padding: 24px 18px 20px; border-radius: 20px; }
            .login-header { margin-bottom: 20px; }
            .login-header h1 { font-size: 20px; margin-top: 12px; }
            .login-header .logo { font-size: 18px; }
            .login-header p { font-size: 13px; }
            .form-group { margin-bottom: 14px; }
            .form-group label { font-size: 12px; }
            .form-group .input-wrapper input { padding: 11px 14px 11px 38px; font-size: 13px; border-radius: 10px; }
            .form-group .input-wrapper i { left: 12px; font-size: 14px; }
            .form-group .input-wrapper .password-toggle { right: 10px; font-size: 14px; }
            .form-options { flex-direction: column; align-items: flex-start; gap: 6px; margin: 2px 0 18px; }
            .btn-login { padding: 13px 16px; font-size: 14px; border-radius: 10px; }
            .alert { padding: 10px 12px; font-size: 12px; border-radius: 10px; }
            .login-footer { font-size: 13px; margin-top: 16px; }
            .login-footer .secure-text { font-size: 11px; margin-top: 10px; }
        }

        @media (max-width: 360px) {
            body { padding: 8px; padding-top: 24px; }
            .login-card { padding: 18px 14px 16px; border-radius: 16px; }
            .login-header h1 { font-size: 18px; }
            .login-header .logo { font-size: 16px; }
            .form-group .input-wrapper input { padding: 10px 12px 10px 34px; font-size: 12px; }
            .btn-login { padding: 11px 14px; font-size: 13px; }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            body { padding: 12px; align-items: center; padding-top: 12px; }
            .login-card { padding: 20px 24px; max-height: 95vh; overflow-y: auto; }
            .login-header { margin-bottom: 14px; }
            .login-header h1 { font-size: 18px; margin-top: 8px; }
            .login-header .logo { font-size: 16px; }
            .form-group { margin-bottom: 10px; }
            .form-group .input-wrapper input { padding: 9px 12px 9px 36px; font-size: 13px; }
            .form-options { margin: 0 0 12px; }
            .btn-login { padding: 10px 16px; font-size: 14px; }
            .login-footer { margin-top: 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-header">
            <div class="logo">
                <i class="fas fa-wallet"></i> Expense<span>Tracker</span>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to your account to continue</p>
        </div>

        <div th:if="${param.registered}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span>Registration successful! Please login.</span>
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span>You have been logged out.</span>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            <span>Invalid username or password.</span>
        </div>

        <form th:action="@{/login}" method="post">

            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="loginPassword" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" onclick="toggleLoginPassword()">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember-me">
                    <span>Remember me</span>
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

        </form>

        <div class="login-footer">
            <p>Don't have an account? <a href="/register">Create one</a></p>
            <p class="secure-text">
                <i class="fas fa-lock"></i> Secure &bull; Encrypted &bull; Private
            </p>
        </div>

    </div>
</div>

<script>
    function toggleLoginPassword() {
        const input = document.getElementById('loginPassword');
        const icon = document.querySelector('.password-toggle i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fas fa-eye';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('loginBtn');
        if (btn) {
            btn.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                this.appendChild(ripple);
                setTimeout(function() { ripple.remove(); }, 600);
            });
        }
    });
</script>

</body>
</html>
