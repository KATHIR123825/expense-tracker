<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #111318;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: #1B1E26;
            border: 1px solid #262A34;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .error-container .error-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .error-container h1 {
            color: #F2EFE9;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .error-container .subtitle {
            color: #8E93A0;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .error-container .error-message {
            color: #F2555A;
            font-size: 14px;
            background: rgba(242, 85, 90, 0.1);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(242, 85, 90, 0.2);
            margin-bottom: 24px;
            word-break: break-word;
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
            background: #E4A96F;
            color: #3A2A16;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-outline {
            background: transparent;
            color: #8E93A0;
            border: 1px solid #262A34;
        }

        .btn-outline:hover {
            color: #F2EFE9;
            border-color: #E4A96F;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">⚠️</div>
    <h1>Something Went Wrong</h1>
    <p class="subtitle">An unexpected error occurred while processing your request.</p>

    <div class="error-message" th:text="${error}">
        Error details will appear here.
    </div>

    <div class="btn-group">
        <a href="/dashboard" class="btn">🏠 Go to Dashboard</a>
        <a href="javascript:history.back()" class="btn btn-outline">🔙 Go Back</a>
    </div>
</div>
</body>
</html>
